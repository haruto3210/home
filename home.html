<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Haruto Projects - ホーム</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --text: #e6edf3;
      --card-bg: rgba(0,0,0,0.45);
      --nav-bg: rgba(0,0,0,0.35);
      --btn: #00c3ff;
      --btn-hover: #00e1ff;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ===== 背景 canvas ===== */
    #cyberCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background: black;
    }

    /* ===== ナビバー ===== */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      backdrop-filter: blur(10px);
      background: var(--nav-bg);
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 999;
      animation: slideDown 0.8s ease;
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: var(--text);
      font-weight: bold;
      transition: 0.2s;
    }

    .nav-links a:hover {
      color: var(--btn-hover);
    }

    .toggle {
      cursor: pointer;
      font-size: 20px;
      margin-left: 20px;
    }

    /* ===== メインカード ===== */
    .wrap {
      max-width: 900px;
      margin: 140px auto 0;
      text-align: center;
      padding: 20px;
      background: var(--card-bg);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(0,255,255,0.4);
    }

    .desc {
      font-size: 17px;
      line-height: 1.9;
      margin-bottom: 35px;
      white-space: pre-wrap;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: var(--btn);
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      transition: 0.25s;
      box-shadow: 0 4px 12px rgba(0,255,255,0.3);
    }

    .btn:hover {
      background: var(--btn-hover);
      transform: scale(1.05);
    }

    .github-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 18px;
      color: var(--text);
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .github-link:hover {
      color: var(--btn-hover);
    }

    #google_translate_element {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
    }
  </style>
</head>
<body>

<!-- ===== サイバー背景 canvas ===== -->
<canvas id="cyberCanvas"></canvas>

<!-- ===== ナビバー ===== -->
<nav>
  <div class="logo">
    <i class="fa-solid fa-cube"></i> Haruto Projects
  </div>

  <div class="nav-links">
    <a href="https://haruto3210.github.io/">ホーム</a>
    <a href="https://haruto3210.github.io/APP/">ダウンロード</a>
    <a href="https://github.com/haruto3210" target="_blank">GitHub</a>
    <span class="toggle" onclick="toggleDark()">🌙</span>
  </div>
</nav>

<!-- ===== メイン内容 ===== -->
<div class="wrap">
  <h1>Haruto APP Download</h1>

  <div class="desc">
Haruto が作成したゲームやユーティリティツールをまとめたダウンロードサイトです。
Windows 向けのインストーラー、ブラウザゲーム、ユーティリティツールなどを公開しています。

OS制限（Windows 10 64bit 推奨）や利用規約は、ダウンロードページ内で確認できます。
  </div>

  <a href="https://haruto3210.github.io/APP/" class="btn">
    <i class="fa-solid fa-download"></i> ダウンロードページへ
  </a>

  <br>

  <a href="https://github.com/haruto3210" class="github-link" target="_blank">
    <i class="fa-brands fa-github"></i> GitHub プロフィールを見る
  </a>
</div>

<!-- Google翻訳 -->
<div id="google_translate_element"></div>

<script>
/* ===== サイバー背景アニメーション ===== */
const canvas = document.getElementById("cyberCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lines = [];

class Line {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = 0;
    this.speed = 2 + Math.random() * 4;
    this.length = 50 + Math.random() * 150;
    this.alpha = 0.2 + Math.random() * 0.5;
  }

  draw() {
    ctx.strokeStyle = `rgba(0,255,255,${this.alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x, this.y + this.length);
    ctx.stroke();
  }

  update() {
    this.y += this.speed;
    if (this.y > canvas.height) {
      this.y = -this.length;
      this.x = Math.random() * canvas.width;
    }
  }
}

for (let i = 0; i < 80; i++) lines.push(new Line());

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  lines.forEach(l => { l.update(); l.draw(); });
  requestAnimationFrame(animate);
}
animate();

/* ===== ダークモード ===== */
function toggleDark() {
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

if (localStorage.getItem("darkMode") === "true") {
  document.body.classList.add("dark");
}

/* ===== Google翻訳 ===== */
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'ja',
    includedLanguages: 'ja,en,zh-CN,zh-TW,ko,fr,es,de,ru,ar',
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE
  }, 'google_translate_element');
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
